run_name: nevermore-demo2
paths:
  repo_root: null           # auto-detected; leave null unless running elsewhere
  output_root: /scratch/home/sr3622/Firm-DTI/Firm-DTI2/outputs    # writes to <repo>/outputs

data:
  data_dir: data
  train_file: train.csv
  test_file: test.csv

features:
  protein_encoder: esm       # "esm" to use ESM tokens, "handcrafted" for unigram/bigram counts
  esm_model: facebook/esm2_t12_35M_UR50D
  max_token_length: 1500
  morgan_bits: 4048
  morgan_radius: 2
  checkpoint: /scratch/home/sr3622/Firm-DTI/Firm-DTI2/output/esm_morgan_trainer/esm_morgan_run_morgan_more/checkpoint.pt
  batch_size: 64
  device: null              # "cuda" | "cpu" | null (auto)

optimization:
  target_affinity: 12.0
  sample_index: 10
  protein_features: 0
  ligand_features: 15
  allow_protein_adjustments: false
  allow_ligand_adjustments: true
  frozen_protein_features: []
  frozen_ligand_features: []
  budget: 300
  regularization: 0.001
  target_sequence: null     # optional override instead of dataset index
  baseline_smiles: null     # optional override instead of dataset index

retrieval:
  max_rel_smiles_len_diff: 0.30
  max_rel_mw_diff: 0.30
  max_l1_distance: null
  top_candidates: 20

visualization:
  enabled: true
  max_mols: 40
  mols_per_row: 6
  panel_size: [300, 240]
  id_col: dataset_index
  out_svg: candidate_ligands_grid.svg
  out_png: candidate_ligands_grid.png

docking:
  enabled: True
  target_key: 3U84
  receptor_pdbqt: /scratch/home/sr3622/Firm-DTI/Firm-DTI2/3U84.pdbqt
  out_root: null            # defaults to nevermore/outputs/docking/<signature>
  exhaustiveness: 32
  num_modes: 20
  seed: 42
  limit: null               # set int to cap ligands
  center: [15, -63, 1]              # supply [x, y, z] to override TDC metadata
  size: [30.0, 30.0, 30.0]

admet:
  enabled: True
  keys: [molecular_weight, logP, HIA_Hou, hERG, QED, Lipinski]

report:
  enabled: true
